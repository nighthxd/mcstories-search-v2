<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCStories Search</title>
    <link rel="stylesheet" href="style-sheet.css">
</head>
<body>
    <header>
        <h1>MCStories Search</h1>
        <button id="theme-toggle">Toggle Dark Mode</button>
    </header>

    <main>
        <div id="filter-section"> 
            <div class="search-input-area">
                <label for="search-input">Search:</label>
                <input type="text" id="search-input" placeholder="Enter keywords...">
                <button onclick="handleSearchClick()">Search</button>
            </div>

            <div class="category-columns-wrapper">
                <div class="category-column">
                    <h4>Include Tags</h4>
                    <label><input type="checkbox" name="include_tag" value="mc"> MC</label><br>
                    <label><input type="checkbox" name="include_tag" value="mf"> MF</label><br>
                    </div>
                <div class="category-column">
                    <h4>Exclude Tags</h4>
                    <label><input type="checkbox" name="exclude_tag" value="inc"> Incest</label><br>
                    <label><input type="checkbox" name="exclude_tag" value="dub"> Dub-con</label><br>
                    </div>
            </div>
        </div>
        <div id="results-container">
            </div>
    </main>

    <script src="search.js"></script>
</body>
</html>
